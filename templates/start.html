{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="quiz-card shadow p-5">

            <h1 class="text-center fw-bold mb-4">

                Identitas Siswa

            </h1>

            <p class="text-center text-muted mb-5">

                Isi data terlebih dahulu
                sebelum memulai tes
                gaya belajar.

            </p>

            <form method="POST">

                <div class="mb-4">

                    <label class="form-label">

                        Nama Lengkap

                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Kelas

                    </label>

                    <input
                        type="text"
                        name="student_class"
                        class="form-control"
                        placeholder="Contoh: 8A"
                        required
                    >

                </div>

                <div class="mb-5">

                    <label class="form-label">

                        Jenis Kelamin

                    </label>

                    <select
                        name="gender"
                        class="form-select"
                        required
                    >

                        <option value="">
                            -- Pilih --
                        </option>

                        <option value="Laki-laki">
                            Laki-laki
                        </option>

                        <option value="Perempuan">
                            Perempuan
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100 py-3"
                >

                    Mulai Tes

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
