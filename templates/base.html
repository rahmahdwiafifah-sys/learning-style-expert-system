<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Sistem Pakar Gaya Belajar
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {

            background: #f4f7ff;

            font-family: Arial, sans-serif;

        }

        .navbar-custom {

            background: linear-gradient(
                90deg,
                #4f46e5,
                #6366f1
            );

        }

        .navbar-brand {

            color: white !important;

            font-weight: bold;

            font-size: 1.4rem;

        }

        .nav-link {

            color: white !important;

            margin-left: 15px;

        }

        .quiz-card {

            border-radius: 25px;

            background: white;

        }

        .question-box {

            min-height: 180px;

        }

        .answer-btn {

            width: 100%;

            padding: 15px;

            border-radius: 15px;

            border: none;

            font-size: 1rem;

            font-weight: bold;

            margin-bottom: 15px;

            transition: 0.2s;

        }

        .answer-btn:hover {

            transform: scale(1.02);

        }

        .progress {

            height: 15px;

            border-radius: 20px;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom shadow">

    <div class="container">

        <a class="navbar-brand" href="/">
            LearnStyle
        </a>

        <button
            class="navbar-toggler bg-white"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="navbarNav"
        >

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/quiz">
                        Mulai Tes
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        Dashboard BK
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about">
                        Tentang Kami
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container py-5">

    {% block content %}
    {% endblock %}

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
