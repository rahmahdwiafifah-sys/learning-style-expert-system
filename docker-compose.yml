services:

  web:

    build: .

    ports:
      - "5000:5000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db

  db:

    image: postgres:16

    restart: always

    environment:
      POSTGRES_DB: learning_style_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: