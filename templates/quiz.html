{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="quiz-card shadow p-5">

            <!-- HEADER -->

            <div class="d-flex justify-content-between mb-3">

                <h5 class="fw-bold">

                    Tes Gaya Belajar

                </h5>

                <h5 id="questionCounter">

                    1/{{ questions|length }}

                </h5>

            </div>

            <!-- PROGRESS BAR -->

            <div class="progress mb-5">

                <div
                    id="progressBar"
                    class="progress-bar bg-primary"
                    style="width:0%"
                ></div>

            </div>

            <!-- FORM -->

            <form
                action="/result"
                method="POST"
                id="quizForm"
            >

                {% for q in questions %}

                <div

                    class="question-slide"

                    {% if loop.index != 1 %}
                        style="display:none;"
                    {% endif %}
                >

                    <!-- PERTANYAAN -->

                    <div class="text-center mb-5">

                        <h2 class="fw-bold">

                            {{ q.question }}

                        </h2>

                    </div>

                    <!-- OPTIONS -->

                    <div class="d-grid gap-4">

                        {% for option in q.options %}

                        <button

                            type="button"

                            class="btn btn-light shadow-lg p-4 text-start answer-card"

                            onclick="selectAnswer(
                                '{{ q.id }}',
                                '{{ option.type }}'
                            )"
                        >

                            <h5 class="mb-0">

                                {{ option.text }}

                            </h5>

                        </button>

                        {% endfor %}

                    </div>

                    <!-- HIDDEN INPUT -->

                    <input
                        type="hidden"
                        name="{{ q.id }}"
                        id="answer{{ q.id }}"
                    >

                </div>

                {% endfor %}

            </form>

        </div>

    </div>

</div>

<style>

.answer-card {

    border-radius: 20px;

    transition: 0.2s;

    border: none;

    background: white;

}

.answer-card:hover {

    transform: translateY(-3px);

    background: #eef2ff;

}

.question-slide {

    animation: fadeIn 0.4s ease;

}

@keyframes fadeIn {

    from {

        opacity: 0;

        transform: translateY(10px);

    }

    to {

        opacity: 1;

        transform: translateY(0);

    }

}

</style>

<script>

const slides =
document.querySelectorAll('.question-slide');

let current = 0;

function updateProgress() {

    const progress =
    ((current + 1) / slides.length) * 100;

    document.getElementById(
        'progressBar'
    ).style.width = progress + '%';

    document.getElementById(
        'questionCounter'
    ).innerText =
    `${current + 1}/${slides.length}`;

}

updateProgress();

function selectAnswer(questionId, value) {

    document.getElementById(
        'answer' + questionId
    ).value = value;

    slides[current].style.display = 'none';

    current++;

    if(current < slides.length) {

        slides[current].style.display = 'block';

        updateProgress();

    }

    else {

        document.getElementById(
            'quizForm'
        ).submit();

    }

}

</script>

{% endblock %}
