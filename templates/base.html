<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        LearnStyle
    </title>

    <!-- BOOTSTRAP -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CHART JS -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- GOOGLE FONT -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>

        :root {

            --primary: #576A8F;

            --secondary: #B7BDF7;

            --cream: #FFF8DE;

            --accent: #FF7444;

        }

        html {

            scroll-behavior: smooth;

        }

        body {

            background: #f8f9ff;

            font-family: 'Poppins', sans-serif;

            overflow-x: hidden;

        }

        /* NAVBAR */

        .navbar-custom {

            background: rgba(255,255,255,0.85);

            backdrop-filter: blur(12px);

            border-radius: 0 0 25px 25px;

            padding-top: 18px;

            padding-bottom: 18px;

        }

        .navbar-brand {

            color: var(--primary) !important;

            font-weight: 700;

            font-size: 1.5rem;

        }

        .nav-link {

            color: var(--primary) !important;

            font-weight: 500;

            margin-left: 20px;

            transition: 0.2s;

        }

        .nav-link:hover {

            color: var(--accent) !important;

        }

        /* GLOBAL SECTION */

        .section-spacing {

            padding-top: 60px;

            padding-bottom: 60px;

        }

        /* BUTTON */

        .primary-btn {

            background: var(--accent);

            color: white;

            border: none;

            padding: 18px 40px;

            border-radius: 20px;

            font-weight: 600;

            transition: 0.2s;

        }

        .primary-btn:hover {

            transform: translateY(-2px);

            background: #ff5f26;

        }

        /* CARD */

        .analytics-card {

            background: white;

            border-radius: 24px;

            padding: 22px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.06);

            height: 100%;

        }

        .quiz-card {

            border-radius: 24px;

            background: white;

            box-shadow: 0 10px 30px rgba(0,0,0,0.06);

            overflow: hidden;

        }

        /* HERO */

        .hero-title {

            font-size: clamp(2.5rem, 5vw, 4.5rem);

            font-weight: 800;

            color: var(--primary);

            line-height: 1.2;

        }

        .hero-highlight {

            color: var(--accent);

        }

        .hero-subtitle {

            font-size: 1.05rem;

            color: #666;

            line-height: 1.9;

            margin-top: 20px;

            max-width: 600px;

        }

        /* BLOB */

        .hero-blob {

            position: absolute;

            border-radius: 50%;

            filter: blur(40px);

            z-index: -1;

        }

        .blob-1 {

            width: 300px;

            height: 300px;

            background: var(--secondary);

            opacity: 0.4;

            top: 50px;

            right: 80px;

        }

        .blob-2 {

            width: 250px;

            height: 250px;

            background: #ffd7c9;

            opacity: 0.5;

            bottom: 0;

            left: -50px;

        }

        /* QUIZ */

        .answer-btn {

            width: 100%;

            padding: 14px 18px;

            border-radius: 16px;

            border: none;

            font-weight: 600;

            transition: 0.2s;

            background: white;

            font-size: 1rem;

            min-height: 65px;

        }

        .answer-btn:hover {

            transform: translateY(-2px);

            background: #eef1ff;

        }

        .progress {

            height: 14px;

            border-radius: 20px;

        }

        /* FOOTER */

        footer {

            background: var(--primary);

            color: white;

            border-radius: 40px 40px 0 0;

            margin-top: 100px;

        }

        /* MOBILE */

        @media(max-width: 768px) {

            .hero-title {

                font-size: 2.5rem;

            }

            .section-spacing {

                padding-top: 70px;

                padding-bottom: 70px;

            }

        }

        @media(max-width: 1200px) {

            .hero-title {

                font-size: 3.2rem;

            }

        }

        @media(max-width: 992px) {

            .hero-title {

                font-size: 2.8rem;

                text-align: center;

            }

    .hero-subtitle {

        text-align: center;

    }

    .hero-mobile-center {

        text-align: center;

    }

    .section-spacing {

        padding-top: 45px;

        padding-bottom: 45px;

    }

    .navbar-nav {

        margin-top: 20px;

        text-align: center;

    }

    .nav-link {

        margin-left: 0;

        margin-bottom: 10px;

    }

}

        @media(max-width: 768px) {

            .hero-title {

                font-size: 2.2rem;

            }

    .hero-subtitle {

        font-size: 1rem;

    }

    .navbar-brand {

        font-size: 1.2rem;

    }

    .analytics-card {

        padding: 18px;

        border-radius: 20px;

    }

    .quiz-card {

        padding: 20px !important;

        border-radius: 20px;

    }

    .answer-btn {

        font-size: 0.95rem;

        min-height: 58px;

        padding: 12px 14px;

    }

    .primary-btn {

        width: 100%;

        padding: 15px;

    }

    h1, h2 {

        line-height: 1.4;

    }

}

        @media(max-width: 576px) {

            .hero-title {

                font-size: 1.9rem;

            }

    .section-spacing {

        padding-top: 35px;

        padding-bottom: 35px;

    }

    .analytics-card {

        padding: 16px;

    }

    .quiz-card {

        padding: 16px !important;

    }

}

    .bg-visual {

        background: #576A8F !important;

        color: white !important;

    }

    .bg-auditory {

        background: #FF7444 !important;

        color: white !important;

    }

    .bg-kinesthetic {

        background: #28a745 !important;

        color: white !important;

    }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav
    class="navbar navbar-expand-lg navbar-custom sticky-top shadow-sm"
>

    <div class="container">

        <a class="navbar-brand" href="#home">

            LearnStyle

        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="navbarNav"
        >

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link" href="#home">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#start-test">

                        Start Test

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#quiz-section">

                        Quiz

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#result-section">

                        Result

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#about-section">

                        About

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link" href="#team-section">

                        Team

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- CONTENT -->

<div class="container-fluid px-lg-5 px-3">

    {% block content %}
    {% endblock %}

</div>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
